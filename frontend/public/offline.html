<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#3d5a3d" />
    <title>Shiloh Snap Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(247, 217, 160, 0.2), transparent 35%),
          linear-gradient(180deg, #17110b 0%, #0f0c08 100%);
        color: #f8f4ea;
        font-family: Georgia, "Times New Roman", serif;
      }

      main {
        max-width: 28rem;
        padding: 2rem;
        text-align: center;
      }

      h1 {
        margin-bottom: 0.75rem;
        font-size: 2rem;
      }

      p {
        line-height: 1.6;
        color: rgba(248, 244, 234, 0.82);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Shiloh Snap Is Offline</h1>
      <p>Your queued captures stay on this device and will sync automatically once the signal comes back.</p>
    </main>
  </body>
</html>
