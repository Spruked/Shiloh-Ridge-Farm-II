<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Prime Checkout</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <div id="app-header">
            <img id="app-logo" src="" alt="App Logo">
            <h1 id="app-title">Pro Prime Checkout</h1>
            <p id="app-description">Secure payment processing for your selected product.</p>
        </div>
        <form id="checkout-form">
            <input type="hidden" id="app_type" required>

            <label for="product_id">Product ID (PPID):</label>
            <input type="text" id="product_id" value="PP-AC-CRT-ELT-001" required>

            <label for="final_price_usd">Final Price (USD):</label>
            <input type="number" id="final_price_usd" value="25" step="0.01" required>

            <label for="customer_email">Email:</label>
            <input type="email" id="customer_email" required>

            <label for="payment_method">Payment Method:</label>
            <select id="payment_method" required>
                <option value="fiat">Fiat (Card)</option>
                <option value="crypto">Crypto</option>
            </select>

            <div id="chain-section" style="display: none;">
                <label for="chain">Blockchain:</label>
                <select id="chain">
                    <option value="polygon">Polygon</option>
                    <option value="ethereum">Ethereum</option>
                    <option value="solana">Solana</option>
                </select>
            </div>

            <div id="wallet-section" style="display: none;">
                <label for="wallet_address">Wallet Address:</label>
                <input type="text" id="wallet_address" placeholder="0x... or Solana address">
            </div>

            <button type="submit">Proceed to Checkout</button>
        </form>

        <div id="result" style="display: none;">
            <h2>Checkout Result</h2>
            <pre id="result-json"></pre>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
