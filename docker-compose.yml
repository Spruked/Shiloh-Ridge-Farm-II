version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: shilohridgefarm-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    env_file:
      - .env
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=${DB_NAME}
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongo-init:/docker-entrypoint-initdb.d
    networks:
      - shilohridgefarm
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: shilohridgefarm-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MONGO_URL=mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/${DB_NAME}?authSource=admin
      - DB_NAME=${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - INITIAL_ADMIN_USERNAME=${INITIAL_ADMIN_USERNAME:-}
      - INITIAL_ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD:-}
      - USDA_API_KEY=${USDA_API_KEY:-}
      - KOKORO_TTS_BIN=${KOKORO_TTS_BIN:-}
      - KOKORO_WSL_BIN=${KOKORO_WSL_BIN:-}
      - KOKORO_MODEL_PATH=${KOKORO_MODEL_PATH:-}
      - KOKORO_VOICES_PATH=${KOKORO_VOICES_PATH:-}
    volumes:
      - ./backend/documents:/app/documents
      - ./backend/butch_audio_cache:/app/butch_audio_cache
      - ./backend/butch_vault:/app/butch_vault
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - shilohridgefarm
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL}
    container_name: shilohridgefarm-frontend
    restart: unless-stopped
    ports:
      - "3100:3000"
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - shilohridgefarm
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  mongodb_data:

networks:
  shilohridgefarm:
    driver: bridge
